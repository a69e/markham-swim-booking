<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | Markham Swim Booking</title>
    <link rel="stylesheet" href="./styles.css?v=20260702-02" />
  </head>
  <body class="checkout-page">
    <main class="checkout-shell">
      <header class="checkout-header">
        <button class="checkout-back" id="checkoutBack" type="button">Back to sessions</button>
        <div class="checkout-title-wrap">
          <h1 class="checkout-title">Checkout</h1>
          <p class="checkout-subtitle">Complete payment or clear the cart, then return here.</p>
        </div>
        <button class="checkout-open" id="checkoutOpen" type="button" hidden>Open official</button>
      </header>

      <section class="checkout-frame-wrap">
        <p class="checkout-message" id="checkoutMessage">Loading checkout...</p>
        <button class="checkout-inline-open" id="checkoutOpenInline" type="button" hidden>
          Open official checkout
        </button>
        <iframe
          class="checkout-frame"
          id="checkoutFrame"
          title="City of Markham checkout"
          referrerpolicy="no-referrer"
        ></iframe>
      </section>
    </main>

    <script src="./checkout.js?v=20260702-02"></script>
  </body>
</html>
